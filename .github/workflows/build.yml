name: Build MyKAI Node

on:
  push:
    tags: ["v*"]          # Build when you push a version tag (v0.1.0, v0.2.0, etc.)
  workflow_dispatch:       # Or trigger manually from GitHub UI anytime

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write      # Needed to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons
        shell: pwsh
        run: |
          $iconDir = "src-tauri\icons"
          New-Item -ItemType Directory -Path $iconDir -Force | Out-Null
          Add-Type -AssemblyName System.Drawing

          foreach ($size in @(32, 128, 256)) {
            $bmp = New-Object System.Drawing.Bitmap($size, $size)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.Clear([System.Drawing.Color]::FromArgb(73, 234, 203))
            $font = New-Object System.Drawing.Font("Segoe UI", [math]::Floor($size * 0.45), [System.Drawing.FontStyle]::Bold)
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(13, 17, 23))
            $sf = New-Object System.Drawing.StringFormat
            $sf.Alignment = [System.Drawing.StringAlignment]::Center
            $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
            $g.DrawString("K", $font, $brush, (New-Object System.Drawing.RectangleF(0, 0, $size, $size)), $sf)
            $g.Dispose()

            if ($size -eq 32)  { $bmp.Save("$iconDir\32x32.png") }
            if ($size -eq 128) { $bmp.Save("$iconDir\128x128.png"); $bmp.Save("$iconDir\icon.png") }
            if ($size -eq 256) { $bmp.Save("$iconDir\128x128@2x.png") }

            if ($size -eq 256) {
              $icon = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
              $fs = [System.IO.File]::Create("$iconDir\icon.ico")
              $icon.Save($fs); $fs.Close()
            }
            $bmp.Dispose()
          }

      - name: Build
        run: cargo tauri build

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: MyKAI-Node-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: MyKAI Node ${{ github.ref_name }}
          body: |
            ## MyKAI Node ${{ github.ref_name }}

            One-click Kaspa private node for Windows.

            **How to install:** Download the `.exe` file below, run it, done.

            Your node will sync automatically. Close the window to minimize to tray — the node keeps running.
          files: src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
